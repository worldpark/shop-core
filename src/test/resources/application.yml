spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.modulith.events.jpa.JpaEventPublicationAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration  # DB 없는 컨텍스트 로드 유지

  flyway:
    enabled: false  # 테스트 컨텍스트: DataSource 없으므로 Flyway 비활성 (FlywayAutoConfiguration 제외와 이중 보장)

  modulith:
    events:
      externalization:
        enabled: false  # 테스트 컨텍스트에서 Kafka 브로커 바인딩 시도 방지

  thymeleaf:
    check-template-location: false

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 2MB

# 테스트용 JWT 설정
# secret: 충분한 길이(32자 이상) 더미값 — 운영 환경 secret과 무관
# TTL: 테스트 검증 편의를 위해 짧은 값 사용
shop:
  order:
    pending-expiry:
      enabled: false  # 테스트 컨텍스트: 스케줄러 빈 비활성 (verification-gate §4)

  admin:
    dashboard:
      sse:
        enabled: false  # 테스트 컨텍스트: SSE 스케줄러 빈 비활성 (AdminDashboardSseSchedulingConfig 미로드)

  seller:
    sales:
      sse:
        enabled: false  # 테스트 컨텍스트: SSE 스케줄러 빈 비활성 (SellerSalesStatsSseSchedulingConfig 미로드)

  security:
    jwt:
      secret: test-secret-key-for-shop-core-test-environment-only-32chars
      access-ttl: PT1H
      refresh-ttl: P1D
      issuer: shop-core-test

  storage:
    root: ${java.io.tmpdir}/shop-test-uploads
    asset-base-url: http://localhost:8080
    public-prefix: /assets
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    max-images-per-product: 10

  crypto:
    kek-file: ${user.dir}/src/test/resources/test-kek.b64
