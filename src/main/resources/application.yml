spring:
  application:
    name: shop-core

  datasource:
    url: ${SHOP_CORE_DB_URL:jdbc:postgresql://localhost:5432/shop_core}
    username: ${SHOP_CORE_DB_USERNAME:shop_core}
    password: ${SHOP_CORE_DB_PASSWORD:shop_core}
    driver-class-name: org.postgresql.Driver
    hikari:
      # [측정용 가드] 기본 10 = HikariCP 현행 기본값. 프로덕션 동작 무변경.
      # VT A/B 측정 시 환경변수로만 상향 (예: SHOP_CORE_HIKARI_MAX_POOL=80).
      # 상향 시 PG max_connections(기본 100) 미만으로만 설정할 것.
      maximum-pool-size: ${SHOP_CORE_HIKARI_MAX_POOL:30}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate  # Flyway가 스키마 소유. Hibernate는 검증만 수행
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false  # 깨끗한 DB 전제 — 기존 schema_history 없는 상태에서 V1부터 적용

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  modulith:
    events:
      externalization:
        enabled: true  # Spring Modulith Event Publication Registry 기반 Kafka 외부화 활성
      # JPA 변형(spring-modulith-starter-jpa) 사용 중이므로 아래 JDBC 전용 프로퍼티는 실효 없음.
      # ddl-auto=validate가 Hibernate 자동 DDL을 이미 차단하므로 추가 비활성 플래그는 불필요.
      # 단, Task 명시 사항을 준수하고 향후 JDBC 변형 전환 시에도 안전하도록 명시적으로 기재한다.
      jdbc:
        schema-initialization:
          enabled: false

  kafka:
    # producer 설정: key=StringSerializer, value=ByteArraySerializer
    # Modulith ByteArrayJsonMessageConverter가 이미 이벤트를 JSON byte[]로 변환해 KafkaTemplate에 넘긴다.
    # ByteArraySerializer는 그 byte[]를 추가 인코딩 없이 wire에 그대로 전송(plain JSON 보장).
    # JsonSerializer를 쓰면 byte[]를 다시 JSON 직렬화해 base64 문자열로 이중 인코딩된다(버그).
    bootstrap-servers: ${SHOP_CORE_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer

  # Redis 접속 설정 — 로컬 단일 Redis, DB index 0(shop-core 전용)
  # 운영 전환 시 SHOP_CORE_REDIS_HOST 환경변수로 인스턴스 분리 가능
  data:
    redis:
      host: ${SHOP_CORE_REDIS_HOST:localhost}
      port: ${SHOP_CORE_REDIS_PORT:6379}
      database: ${SHOP_CORE_REDIS_DB:0}  # shop-core 전용 DB index (notification은 DB 1)
      timeout: 2s

  # Elasticsearch 검색 엔진(ADR-011 T1) — 보조 인덱스 연결.
  # 로컬 단일 노드, 보안 off라 자격증명 불필요. 매니지드 이관 시 username/password/TLS 추가.
  # 색인/쿼리는 후속 Task — 본 설정은 연결·health 와이어링 전용.
  elasticsearch:
    uris: ${SHOP_CORE_SEARCH_URIS:http://localhost:9200}

shop:
  app:
    base-url: ${SHOP_APP_BASE_URL:http://localhost:8080}

  # 도메인 모듈 분리 선언 — 실제 경계 검증은 Spring Modulith/구조 테스트가 담당한다.
  # 모듈 목록은 docs/rules/package-structure-rule.md의 정식 도메인 6개와 동기화한다.
  domains:
    member:
      separated: ${SHOP_DOMAIN_MEMBER_SEPARATED:false}
    product:
      separated: ${SHOP_DOMAIN_PRODUCT_SEPARATED:false}
    cart:
      separated: ${SHOP_DOMAIN_CART_SEPARATED:false}
    inventory:
      separated: ${SHOP_DOMAIN_INVENTORY_SEPARATED:false}
    order:
      separated: ${SHOP_DOMAIN_ORDER_SEPARATED:false}
    payment:
      separated: ${SHOP_DOMAIN_PAYMENT_SEPARATED:false}

  # 상품 색인 Kafka 컨슈머 재시도·DLQ 설정 (SearchIndexKafkaConsumerConfig)
  search:
    indexer:
      enabled: ${SHOP_SEARCH_INDEXER_ENABLED:true}   # 색인 indexer 구독/ES 색인 활성 (운영/로컬 ON). 테스트는 미설정→OFF, indexer 통합 테스트만 ON.
    query:
      timeout-ms: ${SHOP_SEARCH_QUERY_TIMEOUT_MS:800}           # ES 검색 요청 타임아웃 (ms). 초과 시 PG 폴백.
      cooldown-ms: ${SHOP_SEARCH_QUERY_COOLDOWN_MS:5000}         # ES 장애 후 쿨다운 윈도우 (ms). 윈도우 내 요청은 ES 스킵.
      # keyword 최대 길이(100자)는 PublicProductService의 고정 안전 가드 상수(튜닝 대상 아님).
    kafka:
      retry:
        max-attempts: ${SHOP_SEARCH_KAFKA_RETRY_MAX_ATTEMPTS:3}    # 최초 1회 + 재시도 2회
        backoff-ms: ${SHOP_SEARCH_KAFKA_RETRY_BACKOFF_MS:1000}
      dlq:
        suffix: ${SHOP_SEARCH_KAFKA_DLQ_SUFFIX:.DLQ}

  order:
    pending-expiry:
      enabled: ${SHOP_ORDER_EXPIRY_ENABLED:true}    # 운영 활성 (테스트는 false로 명시 비활성)
      ttl: ${SHOP_ORDER_EXPIRY_TTL:PT30M}           # 30분 미결제 만료
      interval: ${SHOP_ORDER_EXPIRY_INTERVAL:PT1M}  # 1분 주기(fixed-delay)
      batch-limit: ${SHOP_ORDER_EXPIRY_BATCH:100}   # 1회 최대 처리 건수

  admin:
    dashboard:
      sse:
        enabled: ${SHOP_ADMIN_DASHBOARD_SSE_ENABLED:true}      # 운영 활성 (테스트는 false로 명시 비활성)
        interval: ${SHOP_ADMIN_DASHBOARD_SSE_INTERVAL:PT10S}   # 10초 push 주기(fixed-delay)
        timeout: ${SHOP_ADMIN_DASHBOARD_SSE_TIMEOUT:PT30M}     # 30분 SSE 연결 타임아웃

  seller:
    sales:
      sse:
        enabled: ${SHOP_SELLER_SALES_SSE_ENABLED:true}         # 운영 활성 (테스트는 false로 명시 비활성)
        interval: ${SHOP_SELLER_SALES_SSE_INTERVAL:PT10S}      # 10초 push 주기(fixed-delay)
        timeout: ${SHOP_SELLER_SALES_SSE_TIMEOUT:PT30M}        # 30분 SSE 연결 타임아웃

  security:
    jwt:
      # [필수] 운영 환경: SHOP_SECURITY_JWT_SECRET 환경변수로 주입. 코드/yml 하드코딩 금지.
      # 부재 또는 32자 미만 시 애플리케이션 기동 실패 (JwtProperties 검증).
      secret: ${SHOP_SECURITY_JWT_SECRET:}
      # access token TTL (기본 30분)
      access-ttl: ${SHOP_SECURITY_JWT_ACCESS_TTL:PT30M}
      # refresh token TTL (기본 14일) — Redis refresh 키 TTL과 동기화 (JwtProperties가 SSOT)
      refresh-ttl: ${SHOP_SECURITY_JWT_REFRESH_TTL:P14D}
      issuer: ${SHOP_SECURITY_JWT_ISSUER:shop-core}

  # Redis key namespace / TTL 설정 — 용도: JWT 로그인 상태 저장 + 분산락
  redis:
    auth:
      # refresh token / 로그인 세션 상태 저장 — 키: {userId}
      refresh-prefix: ${SHOP_REDIS_AUTH_REFRESH_PREFIX:shopcore:auth:refresh:}
      # [주의] refresh-ttl은 코드에서 참조하지 않음. TTL SSOT = JwtProperties.refresh-ttl
      refresh-ttl: ${SHOP_REDIS_AUTH_REFRESH_TTL:P14D}
      # access token blacklist — 키: {jti}, TTL은 access 잔여 만료 시간(동적 산정)
      blacklist-prefix: ${SHOP_REDIS_AUTH_BLACKLIST_PREFIX:shopcore:auth:blacklist:}
      # [주의] blacklist-ttl은 코드에서 참조하지 않음. TTL은 access 잔여 만료 시간으로 동적 산정
      blacklist-ttl: ${SHOP_REDIS_AUTH_BLACKLIST_TTL:PT30M}
      # 비밀번호 재설정 토큰 — 키: {SHA-256(token)}, TTL은 resetTtl(30분)
      reset-prefix: ${SHOP_REDIS_AUTH_RESET_PREFIX:shopcore:auth:reset:}
      # [SSOT] reset-ttl은 PasswordResetService.requestReset에서 참조. 기본 30분.
      reset-ttl: ${SHOP_REDIS_AUTH_RESET_TTL:PT30M}
    lock:
      # 스케줄러 리더 게이트에서 사용(Task 035 — Redisson). 키 = {prefix}scheduler:{name}.
      # 예: shopcore:lock:scheduler:unpaid-order-expiry
      # watchdog 자동 갱신(leaseTime 미지정)이므로 ttl(고정 lease)은 리더 게이트에 미사용.
      # ttl은 고정 lease가 필요한 다른 용도용 레거시 stub.
      prefix: ${SHOP_REDIS_LOCK_PREFIX:shopcore:lock:}
      ttl: ${SHOP_REDIS_LOCK_TTL:PT10S}  # 10초 — 고정 lease 용도용 stub (리더 게이트 미사용)

  storage:
    # 저장소 구현 토글: local(기본, 로컬 파일 시스템) | r2(Cloudflare R2 S3 호환)
    # 운영 전환: SHOP_STORAGE_TYPE=r2 환경변수로 전환
    type: ${SHOP_STORAGE_TYPE:local}
    root: ${SHOP_STORAGE_ROOT:./uploads}
    asset-base-url: ${SHOP_STORAGE_ASSET_BASE_URL:http://localhost:8080}
    public-prefix: ${SHOP_STORAGE_PUBLIC_PREFIX:/assets}
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    max-images-per-product: ${SHOP_STORAGE_MAX_IMAGES_PER_PRODUCT:10}
    # R2 연결 설정 (type=r2 전용)
    # access-key/secret-key는 반드시 환경변수로만 주입 — 코드·yml에 평문 금지
    r2:
      endpoint: ${SHOP_STORAGE_R2_ENDPOINT:}
      bucket: ${SHOP_STORAGE_R2_BUCKET:}
      region: ${SHOP_STORAGE_R2_REGION:auto}
      access-key: ${SHOP_STORAGE_R2_ACCESS_KEY:}
      secret-key: ${SHOP_STORAGE_R2_SECRET_KEY:}
      # 업로드 타임아웃 — 불변식: api-call-timeout-ms ≥ maxRetryAttempts × api-call-attempt-timeout-ms
      # 기본 attempt 15s: 10MB ÷ ~1MB/s(보수적) = 10s, 여유 50% 적용
      # 기본 전체 45s: SDK standard 최대 3회 × 15s = 45s
      api-call-attempt-timeout-ms: ${SHOP_STORAGE_R2_API_CALL_ATTEMPT_TIMEOUT_MS:15000}
      api-call-timeout-ms: ${SHOP_STORAGE_R2_API_CALL_TIMEOUT_MS:45000}
      # PutObject Cache-Control 헤더 — UUID 키 불변이므로 immutable 유효
      cache-control: ${SHOP_STORAGE_R2_CACHE_CONTROL:public, max-age=31536000, immutable}
  threads:
    virtual:
      enabled: false

  crypto:
    kek-file: ${SHOP_CRYPTO_KEK_FILE}

management:
  endpoints:
    web:
      exposure:
        include: ${SHOP_CORE_MGMT_ENDPOINTS:health,info,prometheus}   # 와일드카드 금지(최소 노출)
  endpoint:
    health:
      show-details: when_authorized        # 미인증엔 UP/DOWN만, 상세는 인증 시
      probes:
        enabled: true                      # liveness/readiness (단일 노드 단계 선택, 켜둬도 무해)
      group:
        readiness:
          include: readinessState          # ES(elasticsearch) 컴포넌트 제외 → ES 다운이 readiness DOWN 유발 안 함
  metrics:
    tags:
      application: shop-core               # 037(notification)과 구분되는 공통 태그
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8080
