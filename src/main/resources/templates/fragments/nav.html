<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<body>
<nav th:fragment="nav(active)">
    <ul class="nav-list">
        <li class="nav-item">
            <a th:href="@{/}"
               class="nav-link"
               th:classappend="${active == 'home'} ? ' nav-link-active' : ''"
               th:text="'홈'">홈</a>
        </li>
        <li class="nav-item">
            <a th:href="@{/products}"
               class="nav-link"
               th:classappend="${active == 'products'} ? ' nav-link-active' : ''">상품 목록</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/members}"
               class="nav-link"
               th:classappend="${active == 'admin-members'} ? ' nav-link-active' : ''">회원 관리</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/seller-applications}"
               class="nav-link"
               th:classappend="${active == 'admin-seller-applications'} ? ' nav-link-active' : ''">판매자 신청 심사</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('SELLER')">
            <a th:href="@{/seller/products}"
               class="nav-link"
               th:classappend="${active == 'seller-products'} ? ' nav-link-active' : ''">내 상품</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('SELLER')">
            <a th:href="@{/seller/products/new}"
               class="nav-link"
               th:classappend="${active == 'seller-product-new'} ? ' nav-link-active' : ''">상품 등록</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('CONSUMER')">
            <a th:href="@{/cart}"
               class="nav-link"
               th:classappend="${active == 'cart'} ? ' nav-link-active' : ''">장바구니</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('CONSUMER')">
            <a th:href="@{/orders}"
               class="nav-link"
               th:classappend="${active == 'orders'} ? ' nav-link-active' : ''">주문 내역</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('CONSUMER') and !hasRole('SELLER')">
            <a th:href="@{/seller-applications/apply}"
               class="nav-link"
               th:classappend="${active == 'seller-apply'} ? ' nav-link-active' : ''">판매자 신청</a>
        </li>
    </ul>
</nav>
</body>
</html>
