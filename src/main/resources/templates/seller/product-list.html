<!DOCTYPE html>
<!--
    판매자 본인 상품 목록 화면.
    view name: seller/product-list
    레이아웃: layout/base :: layout(title, content)

    보존 계약:
      - 모델 키: sellerProducts (Page<SellerProductSummaryView>)
          ㄴ content[*].productId  (long)
          ㄴ content[*].name       (String)
          ㄴ content[*].status     (String: DRAFT/ON_SALE/SOLD_OUT/HIDDEN)
          ㄴ content[*].basePrice  (BigDecimal)
          ㄴ content[*].createdAt  (Instant — KST 변환은 temporals.format 사용)
      - 행 링크: /seller/products/{id}/edit, /images, /variants
      - 빈 상태: "등록한 상품이 없습니다" + 상품 등록 링크
      - 페이지네이션: sellerProducts.number, .totalPages, .totalElements, .size
      - ownerId·Entity·로컬 절대경로 미표시
      - nav active: seller-products (NavActiveControllerAdvice 자동 주입)
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko"
      th:replace="~{layout/base :: layout(title=~{::title}, content=~{::main})}">
<head>
    <title>내 상품</title>
</head>
<body>
<main>
    <div class="seller-product-list-container">
        <div class="seller-product-list-header">
            <h1 class="page-title">내 상품</h1>
            <a th:href="@{/seller/products/new}" class="btn btn-primary">상품 등록</a>
        </div>

        <!-- 상품 없을 때 -->
        <div class="order-empty" th:if="${sellerProducts.content.isEmpty()}">
            <p class="empty-msg">등록한 상품이 없습니다.</p>
            <a th:href="@{/seller/products/new}" class="btn btn-primary">상품 등록</a>
        </div>

        <!-- 상품 목록 테이블 -->
        <div class="table-wrapper" th:unless="${sellerProducts.content.isEmpty()}">
            <table class="order-table">
                <thead>
                    <tr>
                        <th scope="col">상품명</th>
                        <th scope="col">상태</th>
                        <th scope="col">가격</th>
                        <th scope="col">등록일</th>
                        <th scope="col">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${sellerProducts.content}" class="order-row">
                        <td class="seller-product-name" th:text="${p.name}">상품명</td>
                        <td class="seller-product-status">
                            <span class="badge-product-status"
                                  th:classappend="' badge-product-' + ${p.status.toLowerCase()}"
                                  th:with="statusLabel=(${p.status} == 'ON_SALE' ? '판매중' :
                                                       (${p.status} == 'DRAFT' ? '임시저장' :
                                                       (${p.status} == 'SOLD_OUT' ? '품절' :
                                                       (${p.status} == 'HIDDEN' ? '숨김' : ${p.status}))))"
                                  th:text="${statusLabel}">상태</span>
                        </td>
                        <td class="seller-product-price">
                            <span th:text="${#numbers.formatDecimal(p.basePrice, 1, 'COMMA', 0, 'POINT')} + '원'">0원</span>
                        </td>
                        <td class="order-created-at">
                            <span th:text="${#temporals.format(p.createdAt.atZone(T(java.time.ZoneId).of('Asia/Seoul')), 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                        </td>
                        <td class="seller-product-actions">
                            <a th:href="@{/seller/products/{id}/edit(id=${p.productId})}"
                               class="btn btn-outline btn-sm">수정</a>
                            <a th:href="@{/seller/products/{id}/images(id=${p.productId})}"
                               class="btn btn-outline btn-sm">이미지</a>
                            <a th:href="@{/seller/products/{id}/variants(id=${p.productId})}"
                               class="btn btn-outline btn-sm">옵션</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <section class="pagination-section" th:unless="${sellerProducts.content.isEmpty()}">
            <div class="pagination">
                <div class="page-info">
                    <span th:text="'총 ' + ${sellerProducts.totalElements} + '건'">총 0건</span>
                    <span th:text="'(' + (${sellerProducts.number} + 1) + ' / ' + ${sellerProducts.totalPages} + ' 페이지)'"> (1 / 1 페이지)</span>
                </div>
                <div class="page-nav">
                    <!-- 이전 페이지 -->
                    <a th:if="${sellerProducts.number > 0}"
                       th:href="@{/seller/products(page=${sellerProducts.number - 1}, size=${sellerProducts.size})}"
                       class="btn btn-outline btn-sm">이전</a>
                    <span th:unless="${sellerProducts.number > 0}"
                          class="btn btn-outline btn-sm disabled">이전</span>

                    <!-- 다음 페이지 -->
                    <a th:if="${sellerProducts.number + 1 < sellerProducts.totalPages}"
                       th:href="@{/seller/products(page=${sellerProducts.number + 1}, size=${sellerProducts.size})}"
                       class="btn btn-outline btn-sm">다음</a>
                    <span th:unless="${sellerProducts.number + 1 < sellerProducts.totalPages}"
                          class="btn btn-outline btn-sm disabled">다음</span>
                </div>
            </div>

            <div class="seller-product-list-footer">
                <a th:href="@{/seller/products/new}" class="btn btn-primary">상품 등록</a>
            </div>
        </section>
    </div>
</main>
</body>
</html>
