<!DOCTYPE html>
<!--
    판매자 주문 조회 화면 (Phase 2 — Task 049: 배송 생성·시작·완료 폼 포함).
    view name: seller/orders
    레이아웃: layout/base :: layout(title, content)

    보존 계약:
      - 모델 키: sellerOrderPage (Page<SellerOrderView>)
          ㄴ content[*].orderId              (long)
          ㄴ content[*].orderNumber          (String)
          ㄴ content[*].orderStatus          (String: pending/paid/preparing/shipping/delivered/cancelled/refunded)
          ㄴ content[*].finalAmount          (BigDecimal)
          ㄴ content[*].createdAt            (Instant — KST 변환)
          ㄴ content[*].items                (List<SellerOrderItemView>)
              ㄴ orderItemId                 (long)
              ㄴ productName                 (String)
              ㄴ optionLabel                 (String, nullable)
              ㄴ quantity                    (int)
              ㄴ unitPrice                   (BigDecimal)
              ㄴ shipmentStatus              (String: null/"preparing"/"shipping"/"delivered")
              ㄴ shipmentId                  (Long, nullable)
          ㄴ content[*].sellerShipments      (List<SellerShipmentView>) — Phase 2
              ㄴ shipmentId                  (long)
              ㄴ status                      (String: preparing/shipping/delivered)
              ㄴ orderItemIds                (List<Long>)
          ㄴ content[*].unshippedOwnedItems  (List<UnshippedOwnedItem>) — Phase 2
              ㄴ orderItemId                 (long)
              ㄴ productName                 (String)
              ㄴ quantity                    (int)
      - 배송 상태 한글 라벨: null → "배송 준비 전", preparing → "배송 준비 중", shipping → "배송 중", delivered → "배송 완료"
      - 빈 상태: "조회된 주문이 없습니다."
      - 페이지네이션: sellerOrderPage.number, .totalPages, .totalElements, .size
      - nav active: seller-orders (NavActiveControllerAdvice 자동 주입)
      - CSRF: th:action 사용으로 자동 주입 (_csrf 수동 금지)
      - PRG + flash: POST 성공/실패 모두 redirect:/seller/orders, flashSuccess/flashError 표시
      - 배송 생성 폼 노출 조건: (orderStatus==paid or preparing) AND unshippedOwnedItems.size ≥ 1
      - 배송 시작 폼 노출 조건: sellerShipments 중 status==preparing
      - 배송 완료 버튼 노출 조건: sellerShipments 중 status==shipping
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko"
      th:replace="~{layout/base :: layout(title=~{::title}, content=~{::main})}">
<head>
    <title>주문 조회</title>
</head>
<body>
<main>
    <div class="seller-product-list-container">
        <div class="seller-product-list-header">
            <h1 class="page-title">주문 조회</h1>
            <a th:href="@{/seller/products}" class="btn btn-outline">내 상품 목록</a>
        </div>

        <!-- 주문 없을 때 -->
        <div class="order-empty" th:if="${sellerOrderPage.totalElements == 0}">
            <p class="empty-msg">조회된 주문이 없습니다.</p>
        </div>

        <!-- 주문 목록 -->
        <div th:unless="${sellerOrderPage.totalElements == 0}">
            <div th:each="order : ${sellerOrderPage.content}" class="seller-order-block">

                <!-- 주문 헤더 -->
                <div class="seller-order-header">
                    <div class="seller-order-meta">
                        <span class="seller-order-number" th:text="${order.orderNumber}">ORDER-0000</span>
                        <span class="badge-order-status"
                              th:with="statusLabel=(${order.orderStatus} == 'pending'    ? '결제 대기' :
                                                   (${order.orderStatus} == 'paid'       ? '결제 완료' :
                                                   (${order.orderStatus} == 'preparing'  ? '배송 준비' :
                                                   (${order.orderStatus} == 'shipping'   ? '배송 중' :
                                                   (${order.orderStatus} == 'delivered'  ? '배송 완료' :
                                                   (${order.orderStatus} == 'cancelled'  ? '취소됨' :
                                                   (${order.orderStatus} == 'refunded'   ? '환불됨' : ${order.orderStatus})))))))"
                              th:classappend="' badge-order-' + ${order.orderStatus}"
                              th:text="${statusLabel}">상태</span>
                    </div>
                    <div class="seller-order-summary">
                        <span class="order-created-at"
                              th:text="${#temporals.format(order.createdAt.atZone(T(java.time.ZoneId).of('Asia/Seoul')), 'yyyy-MM-dd HH:mm')}">
                            2026-01-01 00:00
                        </span>
                        <span class="seller-order-amount"
                              th:text="${#numbers.formatDecimal(order.finalAmount, 1, 'COMMA', 0, 'POINT')} + '원'">
                            0원
                        </span>
                    </div>
                </div>

                <!-- 판매자 소유 항목 테이블 -->
                <div class="table-wrapper">
                    <table class="order-table">
                        <thead>
                            <tr>
                                <th scope="col">상품명</th>
                                <th scope="col">옵션</th>
                                <th scope="col">수량</th>
                                <th scope="col">단가</th>
                                <th scope="col">배송 상태</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}" class="order-row">
                                <td th:text="${item.productName}">상품명</td>
                                <td th:text="${item.optionLabel != null ? item.optionLabel : '-'}">옵션</td>
                                <td th:text="${item.quantity}">1</td>
                                <td>
                                    <span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 'COMMA', 0, 'POINT')} + '원'">0원</span>
                                </td>
                                <td>
                                    <span class="badge-shipment-status"
                                          th:with="shipLabel=(${item.shipmentStatus} == null        ? '배송 준비 전' :
                                                             (${item.shipmentStatus} == 'preparing' ? '배송 준비 중' :
                                                             (${item.shipmentStatus} == 'shipping'  ? '배송 중' :
                                                             (${item.shipmentStatus} == 'delivered' ? '배송 완료' : ${item.shipmentStatus}))))"
                                          th:classappend="${item.shipmentStatus} == null        ? ' badge-shipment-none' :
                                                          (${item.shipmentStatus} == 'preparing' ? ' badge-shipment-preparing' :
                                                          (${item.shipmentStatus} == 'shipping'  ? ' badge-shipment-shipping' :
                                                          (${item.shipmentStatus} == 'delivered' ? ' badge-shipment-delivered' : '')))"
                                          th:text="${shipLabel}">배송 준비 전</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!--
                    배송 현황 + 시작/완료 폼 (Phase 2 — Task 049).
                    sellerShipments: 이 판매자 소유 배송 목록.
                    - status==preparing → 배송 시작 폼 (택배사·운송장, POST /seller/shipments/{id}/ship)
                    - status==shipping  → 배송 완료 버튼 (POST /seller/shipments/{id}/deliver)
                    - status==delivered → 완료 표시만
                    th:action 사용으로 CSRF 자동 주입 (_csrf 수동 금지).
                -->
                <div class="shipments-section" th:if="${!order.sellerShipments.isEmpty()}">
                    <h3 class="section-title">내 배송 현황</h3>
                    <div th:each="s : ${order.sellerShipments}" class="shipment-item">
                        <span class="shipment-id" th:text="'배송 #' + ${s.shipmentId}"></span>
                        <span class="shipment-status"
                              th:with="shipStatusLabel=(${s.status} == 'preparing' ? '배송 준비 중' :
                                                       (${s.status} == 'shipping'  ? '배송 중' :
                                                       (${s.status} == 'delivered' ? '배송 완료' : ${s.status})))"
                              th:classappend="(${s.status} == 'preparing' ? ' badge-shipment-preparing' :
                                              (${s.status} == 'shipping'  ? ' badge-shipment-shipping' :
                                              (${s.status} == 'delivered' ? ' badge-shipment-delivered' : '')))"
                              th:text="${shipStatusLabel}">배송 준비 중</span>

                        <!--
                            배송 시작 폼: preparing 배송에만 노출.
                            POST /seller/shipments/{shipmentId}/ship (절대경로 — SellerShipViewController).
                            th:action 사용 시 _csrf 토큰 자동 주입 (Thymeleaf + Spring Security).
                        -->
                        <div class="ship-form-section" th:if="${s.status == 'preparing'}">
                            <form class="ship-start-form"
                                  method="post"
                                  th:action="@{/seller/shipments/{id}/ship(id=${s.shipmentId})}">
                                <div class="form-group">
                                    <label th:for="'carrier-' + ${s.shipmentId}">택배사</label>
                                    <input type="text"
                                           th:id="'carrier-' + ${s.shipmentId}"
                                           name="carrier"
                                           placeholder="예: CJ대한통운"
                                           required>
                                </div>
                                <div class="form-group">
                                    <label th:for="'trackingNumber-' + ${s.shipmentId}">운송장번호</label>
                                    <input type="text"
                                           th:id="'trackingNumber-' + ${s.shipmentId}"
                                           name="trackingNumber"
                                           placeholder="운송장 번호 입력"
                                           required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-sm">배송 시작</button>
                            </form>
                        </div>

                        <!--
                            배송 완료 버튼: shipping 배송에만 노출.
                            POST /seller/shipments/{shipmentId}/deliver (절대경로 — SellerShipViewController).
                            th:action 사용 시 _csrf 토큰 자동 주입.
                        -->
                        <div class="deliver-form-section" th:if="${s.status == 'shipping'}">
                            <form class="ship-deliver-form"
                                  method="post"
                                  th:action="@{/seller/shipments/{id}/deliver(id=${s.shipmentId})}">
                                <button type="submit" class="btn btn-primary btn-sm">배송 완료</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!--
                    배송 생성 폼 (Phase 2 — Task 049).
                    노출 조건: orderStatus가 paid 또는 preparing이고 unshippedOwnedItems가 1건 이상.
                    POST /seller/orders/{orderId}/shipments.
                    미선택 시 판매자 소유 미발송 항목 전부 포함(facade 처리).
                    th:action 사용으로 CSRF 자동 주입 (_csrf 수동 금지).
                -->
                <div class="shipment-form-section"
                     th:if="${(order.orderStatus == 'paid' or order.orderStatus == 'preparing') and !order.unshippedOwnedItems.isEmpty()}">
                    <h3 class="section-title">배송 생성</h3>
                    <form class="shipment-create-form"
                          method="post"
                          th:action="@{/seller/orders/{orderId}/shipments(orderId=${order.orderId})}">
                        <div class="unshipped-items">
                            <p class="form-hint">포함할 항목을 선택하세요. (미선택 시 내 미발송 항목 전부 포함)</p>
                            <div th:each="item : ${order.unshippedOwnedItems}" class="checkbox-item">
                                <label>
                                    <input type="checkbox"
                                           name="orderItemIds"
                                           th:value="${item.orderItemId}">
                                    <span th:text="${item.productName} + ' x' + ${item.quantity}"></span>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">배송 생성</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <section class="pagination-section" th:unless="${sellerOrderPage.totalElements == 0}">
            <div class="pagination">
                <div class="page-info">
                    <span th:text="'총 ' + ${sellerOrderPage.totalElements} + '건'">총 0건</span>
                    <span th:text="'(' + (${sellerOrderPage.number} + 1) + ' / ' + ${sellerOrderPage.totalPages} + ' 페이지)'"> (1 / 1 페이지)</span>
                </div>
                <div class="page-nav">
                    <!-- 이전 페이지 -->
                    <a th:if="${sellerOrderPage.number > 0}"
                       th:href="@{/seller/orders(page=${sellerOrderPage.number - 1}, size=${sellerOrderPage.size})}"
                       class="btn btn-outline btn-sm">이전</a>
                    <span th:unless="${sellerOrderPage.number > 0}"
                          class="btn btn-outline btn-sm disabled">이전</span>

                    <!-- 다음 페이지 -->
                    <a th:if="${sellerOrderPage.number + 1 < sellerOrderPage.totalPages}"
                       th:href="@{/seller/orders(page=${sellerOrderPage.number + 1}, size=${sellerOrderPage.size})}"
                       class="btn btn-outline btn-sm">다음</a>
                    <span th:unless="${sellerOrderPage.number + 1 < sellerOrderPage.totalPages}"
                          class="btn btn-outline btn-sm disabled">다음</span>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
