<!DOCTYPE html>
<!--
    상품 옵션/옵션값/Variant 관리 화면.
    view name: seller/product-variants
    레이아웃: layout/base :: layout(title, content) — 인증 풀 레이아웃 (nav 포함)

    보존 계약:
      - 모델 키: product(SellerProductRef) / options(List<ProductOptionResponse>) / variants(List<ProductVariantResponse>)
      - 폼 객체: optionForm / optionValueForm / variantForm
      - 옵션 생성 action: POST /seller/products/{productId}/options
      - 옵션값 생성 action: POST /seller/products/{productId}/options/{optionId}/values
      - 옵션 삭제 action: POST /seller/products/{productId}/options/{optionId}/delete
      - Variant 생성 action: POST /seller/products/{productId}/variants
      - Variant 수정 action: POST /seller/products/{productId}/variants/{variantId}
      - Variant 삭제 action: POST /seller/products/{productId}/variants/{variantId}/delete
      - CSRF: th:action 자동 주입 (_csrf 수동 추가 금지)
      - 검증 실패: th:errors로 필드별 메시지 echo
      - Entity 직접 노출 금지 (DTO만 모델에 담김)
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko"
      th:replace="~{layout/base :: layout(title=~{::title}, content=~{::main})}">
<head>
    <title th:text="'옵션/Variant 관리 - ' + ${product.name}">옵션/Variant 관리</title>
</head>
<body>
<main>
    <div class="variants-container">
        <!-- 상품명 헤딩 -->
        <h1 class="page-title" th:text="${product.name} + ' — 옵션/Variant 관리'">상품명 — 옵션/Variant 관리</h1>

        <!-- ====================================================
             옵션 영역
             ==================================================== -->
        <section class="variants-section">
            <h2 class="section-title">옵션 목록</h2>

            <!-- 옵션이 없을 때 -->
            <p class="empty-msg" th:if="${#lists.isEmpty(options)}">등록된 옵션이 없습니다.</p>

            <!-- 옵션 목록 -->
            <div class="option-list" th:unless="${#lists.isEmpty(options)}">
                <div class="option-item" th:each="option : ${options}">
                    <div class="option-header">
                        <span class="option-name" th:text="${option.name}">옵션명</span>
                        <span class="option-values">
                            <span th:if="${#lists.isEmpty(option.values)}" class="no-values">옵션값 없음</span>
                            <span th:each="val, stat : ${option.values}">
                                <span class="option-value-badge" th:text="${val.value}">옵션값</span>
                            </span>
                        </span>
                        <!-- 옵션 삭제 버튼 (2.1) -->
                        <form method="post"
                              th:action="@{/seller/products/{productId}/options/{optionId}/delete(productId=${product.productId}, optionId=${option.optionId})}"
                              onsubmit="return confirm('이 옵션을 삭제하면 옵션값·관련 조합도 삭제됩니다. 계속할까요?')"
                              style="display:inline;margin-left:auto;">
                            <button type="submit" class="btn btn-danger btn-sm">옵션 삭제</button>
                        </form>
                    </div>

                    <!-- 옵션값 생성 폼 (각 옵션마다) -->
                    <div class="option-value-form-wrapper">
                        <form method="post"
                              th:action="@{/seller/products/{productId}/options/{optionId}/values(productId=${product.productId}, optionId=${option.optionId})}"
                              th:object="${optionValueForm}">
                            <div class="form-inline">
                                <label th:for="'value-' + ${option.optionId}">옵션값 추가</label>
                                <input type="text"
                                       th:id="'value-' + ${option.optionId}"
                                       th:name="value"
                                       th:value="${optionValueForm.value}"
                                       placeholder="옵션값을 입력하세요">
                                <span class="field-error"
                                      th:if="${failedOptionValueOptionId != null and failedOptionValueOptionId == option.optionId and #fields.hasErrors('value')}"
                                      th:errors="*{value}"></span>
                                <button type="submit" class="btn btn-secondary btn-sm">추가</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 옵션 생성 폼 -->
            <div class="option-create-form">
                <h3 class="subsection-title">새 옵션 추가</h3>
                <form method="post"
                      th:action="@{/seller/products/{productId}/options(productId=${product.productId})}"
                      th:object="${optionForm}">
                    <div class="form-group">
                        <label for="optionName">옵션명</label>
                        <input type="text"
                               id="optionName"
                               th:field="*{name}"
                               placeholder="예: 색상, 사이즈">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('name')}"
                              th:errors="*{name}"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">옵션 추가</button>
                </form>
            </div>
        </section>

        <!-- ====================================================
             Variant 영역
             ==================================================== -->
        <section class="variants-section">
            <h2 class="section-title">Variant 목록</h2>

            <!-- Variant 테이블 -->
            <div class="table-wrapper" th:unless="${#lists.isEmpty(variants)}">
                <table class="variants-table">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>가격</th>
                            <th>재고</th>
                            <th>활성</th>
                            <th>옵션 조합</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="variant : ${variants}">
                            <td th:text="${variant.sku}">SKU</td>
                            <td th:text="${variant.price}">0</td>
                            <td th:text="${variant.stock}">0</td>
                            <td th:text="${variant.active} ? '활성' : '비활성'">활성</td>
                            <td>
                                <span th:if="${#lists.isEmpty(variant.optionValueLabels)}" class="no-values">-</span>
                                <span th:each="label, stat : ${variant.optionValueLabels}">
                                    <span class="option-value-badge" th:text="${label}">라벨</span>
                                </span>
                            </td>
                            <td>
                                <!-- Variant 수정 버튼 (2.3) — <a href> 대신 <button type="button">으로 교체, data-option-value-ids 추가 -->
                                <button type="button"
                                        class="btn btn-outline btn-sm variant-edit-btn"
                                        th:attr="data-variant-id=${variant.variantId},
                                                 data-sku=${variant.sku},
                                                 data-price=${variant.price},
                                                 data-stock=${variant.stock},
                                                 data-active=${variant.active},
                                                 data-option-value-ids=${#strings.listJoin(variant.optionValueIds, ',')}">수정</button>
                                <!-- Variant 삭제 폼 (2.2) -->
                                <form method="post"
                                      th:action="@{/seller/products/{productId}/variants/{variantId}/delete(productId=${product.productId}, variantId=${variant.variantId})}"
                                      onsubmit="return confirm('이 variant를 삭제할까요?')"
                                      style="display:inline;">
                                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p class="empty-msg" th:if="${#lists.isEmpty(variants)}">등록된 variant가 없습니다.</p>

            <!-- Variant 생성/수정 폼 (2.3) -->
            <div class="variant-create-form" id="variant-edit-form">
                <h3 class="subsection-title" id="variant-form-title">새 Variant 추가</h3>
                <form method="post"
                      id="variant-form"
                      th:action="@{/seller/products/{productId}/variants(productId=${product.productId})}"
                      th:object="${variantForm}">

                    <!-- SKU -->
                    <div class="form-group">
                        <label for="variantSku">SKU</label>
                        <input type="text"
                               id="variantSku"
                               th:field="*{sku}"
                               placeholder="고유한 SKU를 입력하세요">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('sku')}"
                              th:errors="*{sku}"></span>
                    </div>

                    <!-- 가격 -->
                    <div class="form-group">
                        <label for="variantPrice">가격</label>
                        <input type="number"
                               id="variantPrice"
                               th:field="*{price}"
                               step="1"
                               min="0"
                               placeholder="0 이상의 가격을 입력하세요">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('price')}"
                              th:errors="*{price}"></span>
                        <small class="field-hint">이 가격으로 실제 결제됩니다.</small>
                    </div>

                    <!-- 재고 -->
                    <div class="form-group">
                        <label for="variantStock">재고</label>
                        <input type="number"
                               id="variantStock"
                               th:field="*{stock}"
                               step="1"
                               min="0"
                               placeholder="0 이상의 재고를 입력하세요">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('stock')}"
                              th:errors="*{stock}"></span>
                    </div>

                    <!-- 활성 여부 -->
                    <div class="form-group form-check">
                        <input type="checkbox"
                               id="variantActive"
                               th:field="*{active}">
                        <label for="variantActive" class="check-label">활성</label>
                    </div>

                    <!-- 옵션값 선택 (각 옵션마다 값 체크박스) -->
                    <div class="form-group" th:if="${not #lists.isEmpty(options)}">
                        <label>옵션값 선택</label>
                        <div class="option-value-checks" th:each="option : ${options}">
                            <span class="option-group-label" th:text="${option.name}">옵션명</span>
                            <div class="option-value-check-row">
                                <span th:each="val : ${option.values}">
                                    <input type="checkbox"
                                           name="optionValueIds"
                                           th:value="${val.optionValueId}"
                                           th:id="'optionValue-' + ${val.optionValueId}">
                                    <label th:for="'optionValue-' + ${val.optionValueId}"
                                           th:text="${val.value}"
                                           class="check-label">값</label>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex;gap:8px;align-items:center;">
                        <button type="submit" id="variant-form-submit" class="btn btn-primary">Variant 추가</button>
                        <!-- 수정 모드에서만 표시되는 취소 버튼 -->
                        <button type="button" id="variant-form-cancel" class="btn btn-outline" style="display:none;">취소</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- 이동 링크 -->
        <div class="back-link">
            <a th:href="@{/seller/products/{id}/edit(id=${product.productId})}" class="btn btn-outline">
                상품 수정으로 돌아가기
            </a>
            <a th:href="@{/seller/products/{id}/images(id=${product.productId})}" class="btn btn-outline">
                이미지 관리
            </a>
        </div>
    </div>

    <!-- 인라인 스크립트는 반드시 <main> 내부에 둔다 — 레이아웃이 content=~{::main}로 main 내용만 렌더하므로 main 밖 스크립트는 드롭됨 -->
    <script th:inline="javascript">
(function () {
    'use strict';

    /* 서버가 렌더한 상품 ID (Thymeleaf inline) */
    var productId = /*[[${product.productId}]]*/ 0;

    /* 서버가 렌더한 기본 가격 (취소 복귀 시 가격칸 복원에 사용) */
    var basePrice = /*[[${product.basePrice}]]*/ '';
    if (basePrice === null) { basePrice = ''; }

    /* 생성 모드 기본 action (서버 렌더 값 보존) */
    var createAction = '/seller/products/' + productId + '/variants';

    var form        = document.getElementById('variant-form');
    var formTitle   = document.getElementById('variant-form-title');
    var submitBtn   = document.getElementById('variant-form-submit');
    var cancelBtn   = document.getElementById('variant-form-cancel');
    var editSection = document.getElementById('variant-edit-form');

    var skuInput    = document.getElementById('variantSku');
    var priceInput  = document.getElementById('variantPrice');
    var stockInput  = document.getElementById('variantStock');
    var activeInput = document.getElementById('variantActive');

    /** 체크박스 전체 해제 */
    function clearOptionCheckboxes() {
        var boxes = form.querySelectorAll('input[type="checkbox"][name="optionValueIds"]');
        boxes.forEach(function (cb) { cb.checked = false; });
    }

    /** 생성 모드로 복귀 */
    function resetToCreateMode() {
        formTitle.textContent  = '새 Variant 추가';
        submitBtn.textContent  = 'Variant 추가';
        cancelBtn.style.display = 'none';

        form.action = createAction;

        skuInput.value    = '';
        priceInput.value  = (basePrice !== '' ? basePrice : '');
        stockInput.value  = '';
        activeInput.checked = false;

        clearOptionCheckboxes();
    }

    /** 수정 모드로 전환 */
    function switchToEditMode(btn) {
        var variantId     = btn.getAttribute('data-variant-id');
        var sku           = btn.getAttribute('data-sku');
        var price         = btn.getAttribute('data-price');
        var stock         = btn.getAttribute('data-stock');
        var activeVal     = btn.getAttribute('data-active');
        var optionIdsRaw  = btn.getAttribute('data-option-value-ids') || '';

        /* 폼 필드 채우기 */
        skuInput.value    = sku || '';
        priceInput.value  = price || '';
        stockInput.value  = stock || '';
        activeInput.checked = (activeVal === 'true');

        /* 체크박스: 전체 해제 후 해당 id만 체크 */
        clearOptionCheckboxes();
        if (optionIdsRaw.trim() !== '') {
            var selectedIds = optionIdsRaw.split(',').map(function (s) { return s.trim(); });
            selectedIds.forEach(function (id) {
                var cb = form.querySelector('input[type="checkbox"][name="optionValueIds"][value="' + id + '"]');
                if (cb) { cb.checked = true; }
            });
        }

        /* 폼 action 을 update 엔드포인트로 교체 */
        form.action = '/seller/products/' + productId + '/variants/' + variantId;

        /* 라벨·버튼 교체 */
        formTitle.textContent  = 'Variant 수정';
        submitBtn.textContent  = 'Variant 수정';
        cancelBtn.style.display = 'inline-block';

        /* 폼으로 스크롤 */
        editSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* "수정" 버튼 이벤트 위임 */
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.variant-edit-btn');
        if (!btn) { return; }
        switchToEditMode(btn);
    });

    /* "취소" 버튼 */
    if (cancelBtn) {
        cancelBtn.addEventListener('click', function () {
            resetToCreateMode();
        });
    }
}());
    </script>
</main>
</body>
</html>
