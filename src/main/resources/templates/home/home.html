<!DOCTYPE html>
<!--
    layout/base :: layout(title, content) 기반 홈 화면 (샘플 겸용).
    보존 계약:
      - sec:authentication="name"
      - 로그아웃 폼 th:action="@{/logout}" method="post"
      - 뷰 이름: home/home
      - CSRF: th:action 자동 주입
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko"
      th:replace="~{layout/base :: layout(title=~{::title}, content=~{::main})}">
<head>
    <title>홈</title>
</head>
<body>
<main>
    <div class="home-container">
        <h1>홈</h1>
        <p class="welcome">
            환영합니다, <strong sec:authentication="name">사용자</strong>님.
        </p>

        <!--
            th:action 을 사용하면 Thymeleaf가 _csrf 히든 필드를 자동 주입한다.
            로그아웃은 반드시 POST 방식으로 처리한다 (Spring Security 기본 정책).
        -->
        <form th:action="@{/logout}" method="post">
            <button type="submit">로그아웃</button>
        </form>
    </div>
</main>
</body>
</html>
