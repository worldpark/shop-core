<!DOCTYPE html>
<!--
    사용자 쿠폰함 화면.
    view name: coupon/wallet
    레이아웃: layout/base :: layout(title, content)

    모델 키:
      - couponWallet (List<UserCouponResponse>): 보유 쿠폰 목록 (미사용/사용/만료 구분)
      - couponClaimForm (CouponClaimForm): 발급 폼 Backing Object

    보존 계약:
      - 발급 폼: method="post" th:action="@{/coupons/claim}" th:object="${couponClaimForm}"
      - CSRF: th:action 자동 주입 (_csrf 수동 금지)
      - 상태 배지: used=true → 사용완료, expired=true(used=false) → 만료, 나머지 → 미사용
      - 날짜: KST 표현 (#temporals.format, Asia/Seoul)
      - flash.flashSuccess / flash.flashError: layout/base 경유 자동 표시
      - Thymeleaf 예약 모델 키(application/session/param/request) 미사용
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko"
      th:replace="~{layout/base :: layout(title=~{::title}, content=~{::main})}">
<head>
    <title>쿠폰함</title>
</head>
<body>
<main>
    <div class="admin-members-container">
        <h1 class="page-title">내 쿠폰함</h1>

        <!-- flash 메시지는 layout/base가 fragments/messages를 포함하므로 자동 표시 -->

        <!-- 쿠폰 코드 발급 폼 -->
        <section class="form-section" style="margin-bottom: 32px; max-width: 480px;">
            <h2 class="section-title" style="font-size: 1.1rem; margin-bottom: 12px; color: #333;">쿠폰 코드 입력</h2>
            <form method="post"
                  th:action="@{/coupons/claim}"
                  th:object="${couponClaimForm}"
                  class="coupon-claim-form"
                  style="display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap;">

                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="code" class="sr-only">쿠폰 코드</label>
                    <input type="text"
                           id="code"
                           th:field="*{code}"
                           placeholder="쿠폰 코드를 입력하세요"
                           class="form-control"
                           autocomplete="off"
                           data-testid="coupon-code-input">
                    <span th:if="${#fields.hasErrors('code')}"
                          th:errors="*{code}"
                          class="field-error"
                          style="color: #d00; font-size: 13px; display: block; margin-top: 4px;"></span>
                </div>

                <div class="form-group">
                    <button type="submit"
                            class="btn btn-primary"
                            data-testid="coupon-claim-btn">발급받기</button>
                </div>
            </form>
        </section>

        <!-- 보유 쿠폰 목록 -->
        <section class="table-section">
            <h2 class="section-title" style="font-size: 1.1rem; margin-bottom: 12px; color: #333;">보유 쿠폰</h2>

            <div class="table-wrapper">
                <table class="members-table">
                    <thead>
                    <tr>
                        <th>쿠폰명</th>
                        <th>코드</th>
                        <th>할인</th>
                        <th>최소주문금액</th>
                        <th>유효기간</th>
                        <th>상태</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- 빈 목록 안내 -->
                    <tr th:if="${couponWallet.isEmpty()}">
                        <td colspan="6" class="empty-msg">보유한 쿠폰이 없습니다. 쿠폰 코드를 입력해 발급받으세요.</td>
                    </tr>

                    <!-- 쿠폰 행 반복 -->
                    <tr th:each="c : ${couponWallet}"
                        th:classappend="${c.used or c.expired} ? ' coupon-inactive' : ''"
                        data-testid="coupon-row">

                        <td th:text="${c.name}" data-testid="coupon-name"></td>
                        <td>
                            <code th:text="${c.code}" data-testid="coupon-code"></code>
                        </td>
                        <td>
                            <!-- fixed: 금액 할인, percent: 퍼센트 할인 -->
                            <span th:if="${c.discountType == 'fixed'}"
                                  th:text="${#numbers.formatDecimal(c.value, 1, 'COMMA', 0, 'POINT')} + '원 할인'"></span>
                            <span th:if="${c.discountType == 'percent'}"
                                  th:text="${c.value} + '% 할인'"></span>
                            <!-- percent 시 최대 할인금액 병기 -->
                            <span th:if="${c.discountType == 'percent' and c.maxDiscount != null}"
                                  style="color: #666; font-size: 12px;"
                                  th:text="'(최대 ' + ${#numbers.formatDecimal(c.maxDiscount, 1, 'COMMA', 0, 'POINT')} + '원)'"></span>
                        </td>
                        <td>
                            <span th:if="${c.minOrderAmount != null and c.minOrderAmount.compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                                  th:text="${#numbers.formatDecimal(c.minOrderAmount, 1, 'COMMA', 0, 'POINT')} + '원 이상'"></span>
                            <span th:if="${c.minOrderAmount == null or c.minOrderAmount.compareTo(T(java.math.BigDecimal).ZERO) <= 0}">제한 없음</span>
                        </td>
                        <td>
                            <span th:text="${#temporals.format(c.startsAt.atZone(T(java.time.ZoneId).of('Asia/Seoul')), 'yyyy-MM-dd')}"></span>
                            ~
                            <span th:text="${#temporals.format(c.endsAt.atZone(T(java.time.ZoneId).of('Asia/Seoul')), 'yyyy-MM-dd')}"></span>
                        </td>
                        <td>
                            <!-- 상태 배지: 사용완료 > 만료 > 미사용 순 -->
                            <span th:if="${c.used}"
                                  class="badge badge-secondary"
                                  style="background: #6c757d; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px;"
                                  data-testid="badge-used">사용완료</span>
                            <span th:if="${!c.used and c.expired}"
                                  class="badge badge-warning"
                                  style="background: #ffc107; color: #212529; padding: 2px 8px; border-radius: 4px; font-size: 12px;"
                                  data-testid="badge-expired">만료</span>
                            <span th:if="${!c.used and !c.expired}"
                                  class="badge badge-success"
                                  style="background: #28a745; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px;"
                                  data-testid="badge-unused">미사용</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
