<!DOCTYPE html>
<!--
    blank(title, content) 프래그먼트 — 경량 레이아웃 (로그인·에러용).
    head 공통 + footer 만. header/nav 없음.

    사용 예:
      <!DOCTYPE html>
      <html xmlns:th="http://www.thymeleaf.org" lang="ko"
            th:replace="~{layout/blank :: blank(title=~{::title}, content=~{::main})}">
      <head><title>페이지 제목</title></head>
      <body><main>본문 내용</main></body>
      </html>
-->
<html th:fragment="blank(title, content)"
      xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">shop-core</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body class="blank-body">
    <main th:replace="${content}">
        <p>콘텐츠 슬롯</p>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
