<!DOCTYPE html>
<!--
    회원가입 화면.
    view name: member/signup
    레이아웃: layout/blank :: blank(title, content) — 비인증 경량 레이아웃 (login과 동일 패턴)

    보존 계약:
      - 폼 th:action="@{/signup}" method="post"
      - 폼 백킹 객체: th:object="${signupForm}"
      - 필드: email / password / passwordConfirm / name / phone
      - CSRF: th:action 자동 주입 (_csrf 수동 추가 금지)
      - password/passwordConfirm value echo 금지 (ViewController가 검증 실패 시 null clear)
      - 로그인 링크: th:href="@{/login}"
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{layout/blank :: blank(title=~{::title}, content=~{::main})}">
<head>
    <title>회원가입</title>
</head>
<body>
<main>
    <div class="login-container">
        <h1>회원가입</h1>

        <!--
            회원가입 폼.
            th:action 사용 시 Thymeleaf가 _csrf 히든 필드를 자동 주입한다.
            수동으로 _csrf 히든 필드를 추가하지 않는다.
        -->
        <form th:action="@{/signup}" method="post" th:object="${signupForm}">

            <!-- 이메일 (아이디 + 도메인 선택) -->
            <div class="form-group">
                <label for="email-local">이메일</label>
                <div class="email-compose">
                    <input type="text" id="email-local" class="email-local"
                           placeholder="아이디" autocomplete="off">
                    <span class="email-at">@</span>
                    <select id="email-domain" class="email-domain" aria-label="이메일 도메인">
                        <option value="gmail.com">gmail.com</option>
                        <option value="naver.com">naver.com</option>
                        <option value="daum.net">daum.net</option>
                        <option value="">직접입력</option>
                    </select>
                    <input type="text" id="email-domain-custom" class="email-domain-custom"
                           placeholder="도메인 직접입력" autocomplete="off" style="display:none;">
                </div>
                <!-- 실제 전송 필드(서버 계약 유지) — 합성된 전체 이메일 -->
                <input type="hidden" th:field="*{email}">
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <!-- 비밀번호 -->
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       placeholder="비밀번호를 입력하세요 (8자 이상)"
                       autocomplete="new-password">
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="form-group">
                <label for="passwordConfirm">비밀번호 확인</label>
                <input type="password"
                       id="passwordConfirm"
                       th:field="*{passwordConfirm}"
                       placeholder="비밀번호를 다시 입력하세요"
                       autocomplete="new-password">
                <span class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"></span>
            </div>

            <!-- 이름 -->
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text"
                       id="name"
                       th:field="*{name}"
                       placeholder="이름을 입력하세요"
                       autocomplete="name">
                <span class="field-error" th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <!-- 전화번호 (선택) -->
            <div class="form-group">
                <label for="phone">전화번호 <span class="optional">(선택)</span></label>
                <input type="text"
                       id="phone"
                       th:field="*{phone}"
                       placeholder="전화번호를 입력하세요"
                       autocomplete="tel">
            </div>

            <button type="submit">회원가입</button>
        </form>

        <!-- 로그인 링크 -->
        <p class="form-footer-link">
            이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </p>
    </div>

    <!-- 이메일 합성: 아이디 + 도메인(select/직접입력) → hidden email 필드. 서버 전송 필드는 email 하나만 유지 -->
    <script th:inline="none">
        (function () {
            var local = document.getElementById('email-local');
            var select = document.getElementById('email-domain');
            var custom = document.getElementById('email-domain-custom');
            var hidden = document.getElementById('email');
            if (!local || !select || !custom || !hidden) return;

            function domain() {
                return select.value === '' ? custom.value.trim() : select.value;
            }
            function compose() {
                var l = local.value.trim();
                var d = domain();
                hidden.value = l && d ? l + '@' + d : (l ? l + '@' : '');
            }
            function syncCustom() {
                custom.style.display = select.value === '' ? '' : 'none';
            }
            // 검증 실패 재표시 등으로 hidden에 값이 있으면 UI 복원
            (function restore() {
                var v = hidden.value || '';
                var at = v.lastIndexOf('@');
                if (at > 0) {
                    local.value = v.slice(0, at);
                    var dom = v.slice(at + 1);
                    var matched = false;
                    for (var i = 0; i < select.options.length; i++) {
                        if (select.options[i].value === dom && dom !== '') { select.value = dom; matched = true; break; }
                    }
                    if (!matched) { select.value = ''; custom.value = dom; }
                }
                syncCustom();
            })();

            local.addEventListener('input', compose);
            custom.addEventListener('input', compose);
            select.addEventListener('change', function () {
                syncCustom();
                if (select.value === '') custom.focus();
                compose();
            });
            var form = hidden.closest('form');
            if (form) form.addEventListener('submit', compose);
        })();
    </script>
</main>
</body>
</html>
