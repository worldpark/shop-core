<!DOCTYPE html>
<!--
    비밀번호 재설정 요청 화면.
    view name: auth/password-reset-request
    레이아웃: layout/blank :: blank(title, content) — 비인증 경량 레이아웃 (login과 동일 패턴)

    보존 계약:
      - 폼 th:action="@{/password-reset}" method="post"
      - 폼 백킹 객체: th:object="${passwordResetForm}"
      - 필드: email
      - CSRF: th:action 자동 주입 (_csrf 수동 추가 금지)
      - param.sent: 재설정 메일 발송 안내 표시 (enumeration-safe 동일 안내)
      - 로그인 링크: th:href="@{/login}"
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{layout/blank :: blank(title=~{::title}, content=~{::main})}">
<head>
    <title>비밀번호 재설정</title>
</head>
<body>
<main>
    <div class="login-container">
        <h1>비밀번호 재설정</h1>

        <!-- 메일 발송 안내 (enumeration-safe — 존재/미존재 동일 메시지) -->
        <div class="alert alert-success" th:if="${param.sent}">
            입력하신 이메일 주소로 비밀번호 재설정 안내를 보냈습니다(계정이 존재하는 경우).
        </div>

        <!--
            재설정 요청 폼.
            th:action 사용 시 Thymeleaf가 _csrf 히든 필드를 자동 주입한다.
            수동으로 _csrf 히든 필드를 추가하지 않는다.
        -->
        <form th:action="@{/password-reset}" method="post" th:object="${passwordResetForm}">

            <!-- 이메일 -->
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       placeholder="가입 시 이메일을 입력하세요"
                       autocomplete="email"
                       autofocus>
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <button type="submit">재설정 메일 보내기</button>
        </form>

        <!-- 로그인 링크 -->
        <p class="form-footer-link">
            <a th:href="@{/login}">로그인으로 돌아가기</a>
        </p>
    </div>
</main>
</body>
</html>
