<!DOCTYPE html>
<!--
    최초 ADMIN 부트스트랩 화면.
    view name: auth/admin-setup
    레이아웃: layout/blank :: blank(title, content) — 비인증 경량 레이아웃 (login·signup과 동일 패턴)

    보존 계약:
      - 폼 th:action="@{/setup/admin}" method="post"
      - 폼 백킹 객체: th:object="${adminSetupForm}"
      - 필드: email / password / passwordConfirm / name
      - CSRF: th:action 자동 주입 (_csrf 수동 추가 금지)
      - password/passwordConfirm value echo 금지 (ViewController가 검증 실패 시 null clear)
      - 이 화면은 ADMIN 계정이 0명일 때만 노출됨 (AdminSetupViewController 게이트)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{layout/blank :: blank(title=~{::title}, content=~{::main})}">
<head>
    <title>관리자 계정 생성</title>
</head>
<body>
<main>
    <div class="login-container">
        <h1>관리자 계정 생성</h1>

        <!-- 최초 관리자 생성 안내 -->
        <div class="alert alert-info">
            현재 등록된 관리자 계정이 없습니다. 시스템 최초 관리자 계정을 생성해 주세요.
            이 화면은 관리자 계정이 생성되면 더 이상 접근할 수 없습니다.
        </div>

        <!--
            관리자 계정 생성 폼.
            th:action 사용 시 Thymeleaf가 _csrf 히든 필드를 자동 주입한다.
            수동으로 _csrf 히든 필드를 추가하지 않는다.
        -->
        <form th:action="@{/setup/admin}" method="post" th:object="${adminSetupForm}">

            <!-- 이메일 -->
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email"
                       id="email"
                       th:field="*{email}"
                       placeholder="이메일을 입력하세요"
                       autocomplete="email"
                       autofocus>
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <!-- 비밀번호 -->
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       placeholder="비밀번호를 입력하세요 (8자 이상)"
                       autocomplete="new-password">
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="form-group">
                <label for="passwordConfirm">비밀번호 확인</label>
                <input type="password"
                       id="passwordConfirm"
                       th:field="*{passwordConfirm}"
                       placeholder="비밀번호를 다시 입력하세요"
                       autocomplete="new-password">
                <span class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}"
                      th:errors="*{passwordConfirm}"></span>
            </div>

            <!-- 이름 -->
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text"
                       id="name"
                       th:field="*{name}"
                       placeholder="이름을 입력하세요"
                       autocomplete="name">
                <span class="field-error" th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"></span>
            </div>

            <button type="submit">관리자 계정 생성</button>
        </form>
    </div>
</main>
</body>
</html>
