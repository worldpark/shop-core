<!DOCTYPE html>
<!--
    비밀번호 재설정 확정 화면.
    view name: auth/password-reset-confirm
    레이아웃: layout/blank :: blank(title, content) — 비인증 경량 레이아웃 (login과 동일 패턴)

    보존 계약:
      - model.resetTokenValid (scalar boolean): true=폼 표시, false=안내 화면
      - 폼 th:action="@{/password-reset/confirm}" method="post"
      - 폼 백킹 객체: th:object="${passwordResetConfirmForm}"
      - 필드: token(hidden), newPassword, newPasswordConfirm
      - CSRF: th:action 자동 주입 (_csrf 수동 추가 금지)
      - 비번 echo 금지: newPassword/newPasswordConfirm value 미바인딩
        (PasswordResetViewController가 검증 실패 시 null clear, th:field → 빈 값 렌더)
      - 무효 토큰 안내: resetTokenValid=false 시 폼 숨김 + 재요청 링크
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      th:replace="~{layout/blank :: blank(title=~{::title}, content=~{::main})}">
<head>
    <title>새 비밀번호 설정</title>
</head>
<body>
<main>
    <div class="login-container">
        <h1>새 비밀번호 설정</h1>

        <!-- 토큰 유효 → 새 비밀번호 폼 표시 -->
        <th:block th:if="${resetTokenValid}">
            <!--
                새 비밀번호 설정 폼.
                th:action 사용 시 Thymeleaf가 _csrf 히든 필드를 자동 주입한다.
                수동으로 _csrf 히든 필드를 추가하지 않는다.
                비밀번호 필드는 검증 실패 재렌더 시 PasswordResetViewController가 null로 clear한다.
                th:field 사용 시 null은 빈 문자열("")로 렌더되어 비밀번호 echo가 차단된다.
            -->
            <form th:action="@{/password-reset/confirm}" method="post"
                  th:object="${passwordResetConfirmForm}" autocomplete="off">

                <!-- token hidden 필드 (1회용 소비용) -->
                <input type="hidden" th:field="*{token}">

                <!-- 새 비밀번호 -->
                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password"
                           id="newPassword"
                           th:field="*{newPassword}"
                           placeholder="새 비밀번호를 입력하세요 (8자 이상)"
                           autocomplete="new-password">
                    <span class="field-error" th:if="${#fields.hasErrors('newPassword')}"
                          th:errors="*{newPassword}"></span>
                </div>

                <!-- 새 비밀번호 확인 -->
                <div class="form-group">
                    <label for="newPasswordConfirm">새 비밀번호 확인</label>
                    <input type="password"
                           id="newPasswordConfirm"
                           th:field="*{newPasswordConfirm}"
                           placeholder="새 비밀번호를 다시 입력하세요"
                           autocomplete="new-password">
                    <span class="field-error" th:if="${#fields.hasErrors('newPasswordConfirm')}"
                          th:errors="*{newPasswordConfirm}"></span>
                </div>

                <button type="submit">비밀번호 변경</button>
            </form>
        </th:block>

        <!-- 토큰 무효/만료 → 안내 화면 -->
        <th:block th:unless="${resetTokenValid}">
            <div class="alert alert-error">
                유효하지 않거나 만료된 링크입니다. 비밀번호 재설정을 다시 요청해 주세요.
            </div>
            <p class="form-footer-link">
                <a th:href="@{/password-reset}">비밀번호 재설정 다시 요청하기</a>
            </p>
        </th:block>

        <!-- 로그인 링크 -->
        <p class="form-footer-link">
            <a th:href="@{/login}">로그인으로 돌아가기</a>
        </p>
    </div>
</main>
</body>
</html>
