spring:
  config:
    activate:
      on-profile: local

  thymeleaf:
    cache: false
    prefix: file:src/main/resources/templates/

  web:
    resources:
      static-locations:
        - file:src/main/resources/static/
        - classpath:/static/
      cache:
        period: 0
      chain:
        cache: false

shop:
  security:
    jwt:
      # Local development only. Production must provide SHOP_SECURITY_JWT_SECRET.
      secret: ${SHOP_SECURITY_JWT_SECRET:local-development-jwt-secret-32-bytes-minimum}

  storage:
    root: ${SHOP_STORAGE_ROOT:./build/local-uploads}
    asset-base-url: ${SHOP_STORAGE_ASSET_BASE_URL:http://localhost:8080}

  domains:
    member:
      separated: ${SHOP_DOMAIN_MEMBER_SEPARATED:false}
    product:
      separated: ${SHOP_DOMAIN_PRODUCT_SEPARATED:false}
    cart:
      separated: ${SHOP_DOMAIN_CART_SEPARATED:false}
    inventory:
      separated: ${SHOP_DOMAIN_INVENTORY_SEPARATED:false}
    order:
      separated: ${SHOP_DOMAIN_ORDER_SEPARATED:false}
    payment:
      separated: ${SHOP_DOMAIN_PAYMENT_SEPARATED:false}

